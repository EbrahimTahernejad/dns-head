name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          ext='${{ matrix.ext }}'
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/dns-head-server${ext}" ./cmd/dns-head-server
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/dns-head-client${ext}" ./cmd/dns-head-client

      - name: package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          name="dns-head-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          cp dist/dns-head-server* "dist/${name}/"
          cp dist/dns-head-client* "dist/${name}/"
          cp install.sh README.md "dist/${name}/" 2>/dev/null || true
          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip -qr "${name}.zip" "${name}"
          else
            tar czf "${name}.tar.gz" "${name}"
          fi
          ls -lh "${name}".*

      - uses: actions/upload-artifact@v4
        with:
          name: dns-head-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: sha256sums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
